name: Screenshot

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL arba parametras skriptui"
        required: true
        default: "https://dev.avesa.lt"
      browser:
        description: "1 = instaliuoti narsykle (Playwright), 0 = tik curl"
        required: false
        default: "0"

permissions:
  contents: write

jobs:
  shot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright (tik jei browser=1)
        if: ${{ github.event.inputs.browser == '1' }}
        run: |
          npm init -y
          npm i playwright
          npx playwright install --with-deps chromium

      - name: Run task
        env:
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
        run: node screenshot.mjs "${{ github.event.inputs.url }}"

      - name: Commit results
        run: |
          git config user.name "petshop-bot"
          git config user.email "bot@petshop.local"
          if git ls-files --error-unmatch node_modules >/dev/null 2>&1; then
            git rm -r --cached -q node_modules package.json package-lock.json 2>/dev/null || true
          fi
          git add screenshots/ .gitignore
          git commit -m "task $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "no changes"
          git checkout -- . 2>/dev/null || true
          git clean -fd -e screenshots 2>/dev/null || true
          for i in 1 2 3 4 5 6; do
            git fetch origin main
            git rebase origin/main || git rebase --abort
            if git push origin HEAD:main; then echo "PUSHED"; break; fi
            echo "retry $i"; sleep 4
          done
