name: Screenshot

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Puslapio URL (pvz. dev.avesa.lt kategorija)"
        required: true
        default: "https://dev.avesa.lt/kategorija/katems/dubeneliai-katems/"

permissions:
  contents: write

jobs:
  shot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm init -y
          npm i playwright
          npx playwright install --with-deps chromium

      - name: Take screenshots
        run: node screenshot.mjs "${{ github.event.inputs.url }}"

      - name: Commit screenshots
        run: |
          git config user.name "petshop-bot"
          git config user.email "bot@petshop.local"
          git add screenshots/
          git commit -m "screenshot $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "no changes"
          git pull --rebase origin main
          git push
