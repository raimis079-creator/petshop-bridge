name: Screenshot

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL arba parametras skriptui"
        required: true
        default: "https://dev.avesa.lt"
      browser:
        description: "1 = instaliuoti narsykle (Playwright), 0 = tik curl"
        required: false
        default: "0"

permissions:
  contents: write

jobs:
  shot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright (tik jei browser=1)
        if: ${{ github.event.inputs.browser == '1' }}
        run: |
          npm init -y
          npm i playwright
          npx playwright install --with-deps chromium

      - name: Run task
        env:
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: node screenshot.mjs "${{ github.event.inputs.url }}"
